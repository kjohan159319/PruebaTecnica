version: '3.8'

services:
  tests:
    build:
      context: .
      dockerfile: test/GestionUsuariosTest/Dockerfile.Test
    container_name: gestionusuarios-tests

  sqlserver:
    build:
      context: ./sqlServer
      dockerfile: Dockerfile
    container_name: gestionusuarios-sqlserver
    ports:
      - "1433:1433"
    environment:
      - SA_PASSWORD=Admin@1234!
      - MSSQL_SA_PASSWORD=Admin@1234!

  api:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: gestionusuarios-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - sqlserver
      - tests

  wcf:
    build:
      context: .
      dockerfile: src/Dockerfile.wcf
    container_name: gestionusuarios-wcf
    ports:
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8081
    depends_on:
      - sqlserver
      - tests
